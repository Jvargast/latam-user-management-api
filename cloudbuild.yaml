substitutions:
  _REGION: us-central1
  _ARTIFACT_REPOSITORY: latam-user-management
  _IMAGE_NAME: user-api
  _SERVICE_NAME: latam-user-management-api
  _DATABASE_URL_SECRET: DATABASE_URL

steps:
  - id: run-tests
    name: python:3.13.13-slim-bookworm
    entrypoint: sh
    args:
      - -c
      - |
        # Las pruebas se ejecutan antes de construir o desplegar
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        pytest

  - id: ensure-artifact-registry
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:567.0.0-stable
    entrypoint: sh
    args:
      - -c
      - |
        # El repositorio de imágenes se crea solo si todavía no existe
        gcloud artifacts repositories describe "${_ARTIFACT_REPOSITORY}" \
          --location="${_REGION}" \
        || gcloud artifacts repositories create "${_ARTIFACT_REPOSITORY}" \
          --repository-format=docker \
          --location="${_REGION}" \
          --description="Docker images for the LATAM user management API"

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --pull
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$BUILD_ID
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$BUILD_ID

  - id: run-migrations
    name: python:3.13.13-slim-bookworm
    entrypoint: bash
    secretEnv:
      - DATABASE_URL
    args:
      - -c
      - |
        # Se aplican migraciones antes de publicar la nueva revisión
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        alembic upgrade head

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:567.0.0-stable
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --timeout=300s
      - --set-env-vars=ENVIRONMENT=production,LOG_LEVEL=INFO
      # DATABASE_URL se toma desde Secret Manager, no desde el repositorio
      - --set-secrets=DATABASE_URL=${_DATABASE_URL_SECRET}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$BUILD_ID

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/${_DATABASE_URL_SECRET}/versions/latest
      env: DATABASE_URL

options:
  logging: CLOUD_LOGGING_ONLY
