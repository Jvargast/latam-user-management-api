name: latam-user-management-api

services:
  api:
    # Misma imagen que se usa para validar el contenedor antes de subirlo
    build:
      context: .
      dockerfile: Dockerfile
    container_name: latam-user-management-api
    environment:
      APP_NAME: LATAM User Management API
      APP_VERSION: 1.0.0
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://latam:latam@postgres:5432/users_db
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    # Postgres 18.3 misma que imagen local
    image: postgres:18.3-alpine
    container_name: latam-user-management-db
    environment:
      POSTGRES_USER: latam
      POSTGRES_PASSWORD: latam
      POSTGRES_DB: users_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U latam -d users_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    name: latam-user-management-postgres-data
